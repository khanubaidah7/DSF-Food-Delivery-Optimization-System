<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Fasteat</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon.svg') }}" type="image/svg+xml">
</head>
<body>

<header class="header" data-header>
  <div class="container">
    <a href="{{ url_for('home') }}" class="logo">
      <img src="{{ url_for('static', filename='images/logo.svg') }}" width="148" height="38" alt="Fasteat home">
    </a>
    <nav class="navbar" data-navbar>
      <ul class="navbar-list">
        <li class="navbar-item"><a href="{{ url_for('home') }}" class="navbar-link">Home</a></li>
        <li class="navbar-item"><a href="{{ url_for('about') }}" class="navbar-link">About Us</a></li>
        <li class="navbar-item"><a href="{{ url_for('restaurants') }}" class="navbar-link">Restaurants</a></li>
        <li class="navbar-item"><a href="{{ url_for('contact') }}" class="navbar-link">Contact Us</a></li>
      </ul>
    </nav>
  </div>
</header>

<main>
  <section class="section contact" data-reveal>
    <div class="container">
      <h1 class="h1 section-title">Contact Us</h1>
      <p class="section-text">Have questions? Reach out to us and we’ll get back to you as soon as possible.</p>
      <form action="#" class="contact-form">
        <input type="text" name="name" placeholder="Your Name" required class="input-field">
        <input type="email" name="email" placeholder="Your Email" required class="input-field">
        <textarea name="message" placeholder="Your Message" required class="input-field"></textarea>
        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="container">
    <p class="copyright">
      &copy; 2022 Fasteat. All rights reserved.
    </p>
  </div>
</footer>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
