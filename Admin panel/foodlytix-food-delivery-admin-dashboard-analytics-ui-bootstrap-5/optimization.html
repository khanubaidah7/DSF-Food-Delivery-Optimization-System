<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Route Optimization</title>
</head>
<body>

<h2>Route Optimization</h2>

<form>
  <label>Restaurant Location:</label>
  <input type="text" placeholder="Enter restaurant location"><br><br>

</div>
